# fly.toml app configuration file generated for skyfi-mcp-server on 2026-03-15T12:37:01-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'skyfi-mcp-server'
primary_region = 'iad'

[build]

[env]
  PORT = '8000'
  SKYFI_MCP_DATA_DIR = '/data'

[[mounts]]
  source = 'skyfi_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
