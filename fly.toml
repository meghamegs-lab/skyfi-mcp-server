app = "skyfi-mcp-server"
primary_region = "iad"

[build]

[env]
  PORT = "8000"
  SKYFI_MCP_DATA_DIR = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "skyfi_data"
  destination = "/data"
